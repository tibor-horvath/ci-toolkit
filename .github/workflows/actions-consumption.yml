name: Actions Consumption Report (reusable)

# Stack-agnostic reporter: posts a run's billable minutes (per OS) to the job
# summary via the runs/{id}/timing REST endpoint.
#
# IMPORTANT: a run's billable time is finalized only AFTER it completes, so a
# run cannot measure itself. Trigger this on the *completed* run via a tiny
# workflow_run workflow in the consumer repo:
#
#   name: CI Consumption
#   on:
#     workflow_run:
#       workflows: ["CI"]          # <- name of the workflow to measure
#       types: [completed]
#   permissions:
#     actions: read
#   jobs:
#     report:
#       uses: tibor-horvath/ci-toolkit/.github/workflows/actions-consumption.yml@v1
#       with:
#         run-id: ${{ github.event.workflow_run.id }}
#       permissions:
#         actions: read

on:
  workflow_call:
    inputs:
      run-id:
        description: >-
          Run ID to report on. Defaults to the current run — but a run cannot
          see its own finalized billing, so pass a completed run's id
          (github.event.workflow_run.id) for real numbers.
        type: string
        default: ""
      runs-on:
        description: "Runner label."
        type: string
        default: "ubuntu-latest"
    secrets:
      billing_token:
        description: >-
          Optional PAT to show account-level Actions minutes (used / included /
          remaining). The built-in GITHUB_TOKEN cannot read billing. Classic PAT
          needs `user` scope; fine-grained needs account "Plan" read-only. When
          omitted, the account-usage section is skipped.
        required: false

permissions:
  actions: read

jobs:
  report:
    name: Actions Consumption
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Report billable minutes
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          OWNER: ${{ github.repository_owner }}
          RUN_ID: ${{ inputs.run-id != '' && inputs.run-id || github.run_id }}
          BILLING_TOKEN: ${{ secrets.billing_token }}
        run: |
          # `gh` and `jq` are preinstalled on GitHub-hosted runners.
          # Billing can lag a few seconds after completion — poll briefly.
          timing='{}'
          for attempt in 1 2 3 4 5 6; do
            timing=$(gh api "repos/${REPO}/actions/runs/${RUN_ID}/timing")
            total=$(echo "$timing" | jq '[(.billable // {}) | .[].total_ms] | add // 0')
            if [ "${total:-0}" -gt 0 ]; then break; fi
            echo "Attempt ${attempt}: billable data not ready, waiting 10s…"
            sleep 10
          done

          # Job id -> name map, to label the per-job breakdown.
          jobs_json=$(gh api "repos/${REPO}/actions/runs/${RUN_ID}/jobs?per_page=100")

          {
            echo "## ⏱️ GitHub Actions consumption — run #${RUN_ID}"
            echo ""
            echo "### By OS"
            echo "| OS | Jobs | Billable runtime |"
            echo "|----|-----:|-----------------:|"
            echo "$timing" | jq -r '
              if ((.billable // {}) | length) == 0 then
                "| _no billable data_ | — | — |"
              else
                ((.billable) | to_entries[]
                 | "| \(.key) | \(.value.jobs // 0) | \(((.value.total_ms // 0) / 60000) | floor) min (\(.value.total_ms // 0) ms) |")
              end'

            echo ""
            echo "### By job"
            echo "| Job | OS | Runtime | Billed (rounded up) |"
            echo "|-----|----|--------:|--------------------:|"
            echo "$timing" | jq -r --argjson jobs "$jobs_json" '
              (($jobs.jobs // []) | map({(.id|tostring): .name}) | add // {}) as $names
              | (.billable // {}) | to_entries[]
              | .key as $os | (.value.job_runs // [])[]
              | (.duration_ms // 0) as $ms
              | "| \($names[(.job_id|tostring)] // ("#" + (.job_id|tostring))) | \($os) | \(($ms/1000)|floor)s (\($ms) ms) | \((($ms + 59999)/60000)|floor) min |"'

            echo ""
            dur=$(echo "$timing" | jq -r '(.run_duration_ms // 0)')
            echo "_Wall-clock run duration: $((dur / 1000))s._"
            echo ""
            echo "> GitHub rounds **each job** up to the next whole minute and applies OS"
            echo "> multipliers (Linux 1× · Windows 2× · macOS 10×) at invoice time. The"
            echo "> \"Billed\" column shows the per-job rounding; multipliers are not applied here."
          } >> "$GITHUB_STEP_SUMMARY"

          # Account-level remaining minutes (only if a billing PAT was provided).
          if [ -n "${BILLING_TOKEN:-}" ]; then
            {
              echo ""
              echo "### Account usage (Actions minutes)"
            } >> "$GITHUB_STEP_SUMMARY"
            if billing=$(GH_TOKEN="$BILLING_TOKEN" gh api "users/${OWNER}/settings/billing/actions" 2>/dev/null); then
              echo "$billing" | jq -r '
                (.included_minutes // 0) as $inc
                | (.total_minutes_used // 0) as $used
                | (.total_paid_minutes_used // 0) as $paid
                | "| Included | Used | Remaining | Paid overage |",
                  "|---------:|-----:|----------:|-------------:|",
                  "| \($inc) min | \($used) min | \((($inc - $used)) | if . < 0 then 0 else . end) min | \($paid) min |"
              ' >> "$GITHUB_STEP_SUMMARY"
            else
              echo "_Account billing unavailable — the token lacks Plan read access, or the account uses the newer metered billing platform (check the billing dashboard)._" >> "$GITHUB_STEP_SUMMARY"
            fi
          fi
