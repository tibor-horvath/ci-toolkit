name: Actions Consumption Report (reusable)

# Stack-agnostic reporter: posts a run's Actions usage (per OS and per job) to
# the job summary.
#
# Usage is computed from each job's start/finish timestamps (rounded up per job
# × OS multiplier), NOT from runs/{id}/timing — that endpoint's `billable` field
# returns 0 on GitHub's newer metered billing platform. Timestamps work on both.
#
# IMPORTANT: trigger this on the *completed* run via a workflow_run workflow in
# the consumer repo, and pass that run's id:
#
#   name: CI Consumption
#   on:
#     workflow_run:
#       workflows: ["CI"]
#       types: [completed]
#   permissions:
#     actions: read
#   jobs:
#     report:
#       uses: tibor-horvath/ci-toolkit/.github/workflows/actions-consumption.yml@v1
#       with:
#         run-id: ${{ github.event.workflow_run.id }}
#       permissions:
#         actions: read

on:
  workflow_call:
    inputs:
      run-id:
        description: >-
          Run ID to report on. Defaults to the current run — but for real
          numbers pass a completed run's id (github.event.workflow_run.id).
        type: string
        default: ""
      runs-on:
        description: "Runner label."
        type: string
        default: "ubuntu-latest"
      included-minutes:
        description: >-
          Your plan's monthly included Actions minutes (e.g. 2000 Free, 3000 Pro).
          The usage API reports consumption, not the allowance, so set this to get
          a "remaining" figure. 0 (default) shows used/cost only.
        type: number
        default: 0
    secrets:
      billing_token:
        description: >-
          Optional **classic** PAT (with `Plan` read / `user` scope) to show
          account-level Actions usage from the enhanced billing usage API. The
          built-in GITHUB_TOKEN cannot read billing, and fine-grained PATs are
          NOT supported by the billing endpoints. Omit to skip the section.
        required: false

permissions:
  actions: read

jobs:
  report:
    name: Actions Consumption
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Report Actions usage
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          OWNER: ${{ github.repository_owner }}
          RUN_ID: ${{ inputs.run-id != '' && inputs.run-id || github.run_id }}
          BILLING_TOKEN: ${{ secrets.billing_token }}
          INCLUDED: ${{ inputs.included-minutes }}
        run: |
          # `gh` and `jq` are preinstalled on GitHub-hosted runners.
          jobs_json=$(gh api "repos/${REPO}/actions/runs/${RUN_ID}/jobs?per_page=100")

          # Augment each completed job with OS, runtime (s) and billed minutes
          # (ceil to the minute × OS multiplier).
          aug=$(echo "$jobs_json" | jq -c '
            def osof($l): ($l // [] | map(ascii_downcase)) as $d
              | if   ($d | any(test("windows"))) then "WINDOWS"
                elif ($d | any(test("mac")))     then "MACOS"
                else "UBUNTU" end;
            def mult($os): if $os == "WINDOWS" then 2 elif $os == "MACOS" then 10 else 1 end;
            [ .jobs[]
              | select(.started_at != null and .completed_at != null)
              | (osof(.labels)) as $os
              | (((.completed_at | fromdateiso8601) - (.started_at | fromdateiso8601))) as $dur
              | { name, os: $os, dur: $dur, billed: ((($dur / 60) | ceil) * mult($os)) } ]')

          total=$(echo "$aug" | jq '[.[].billed] | add // 0')

          {
            echo "## ⏱️ GitHub Actions consumption — run #${RUN_ID}"
            echo ""
            echo "### By OS (estimated)"
            echo "| OS | Jobs | Billed |"
            echo "|----|-----:|-------:|"
            echo "$aug" | jq -r '
              if length == 0 then "| _no completed jobs_ | — | — |"
              else (group_by(.os)[] | "| \(.[0].os) | \(length) | \([.[].billed] | add) min |")
              end'

            echo ""
            echo "### By job (estimated)"
            echo "| Job | OS | Runtime | Billed |"
            echo "|-----|----|--------:|-------:|"
            echo "$aug" | jq -r '
              if length == 0 then "| _no completed jobs_ | — | — | — |"
              else (.[] | "| \(.name) | \(.os) | \((.dur | floor))s | \(.billed) min |")
              end'

            echo ""
            echo "**Estimated billable total: ${total} min** — each job rounded up to the"
            echo "next minute × OS multiplier (Linux 1× · Windows 2× · macOS 10×)."
            echo ""
            echo "> Derived from job start/finish times. The \`runs/{id}/timing\` billable"
            echo "> field returns 0 on GitHub's metered billing platform, so this is a"
            echo "> close estimate rather than the invoiced figure."
          } >> "$GITHUB_STEP_SUMMARY"

          # Account-level Actions usage from the enhanced billing usage API
          # (current month), only if a billing PAT was provided.
          if [ -n "${BILLING_TOKEN:-}" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### Account usage — Actions (current month)" >> "$GITHUB_STEP_SUMMARY"
            if usage=$(GH_TOKEN="$BILLING_TOKEN" gh api \
                  -H "X-GitHub-Api-Version: 2026-03-10" \
                  "users/${OWNER}/settings/billing/usage" 2>/dev/null); then
              # Keep only Actions minute line items.
              acts=$(echo "$usage" | jq -c '
                [ .usageItems[]
                  | select((.product | ascii_downcase | test("actions"))
                           and ((.unitType // "") | ascii_downcase == "minutes")) ]')

              if [ "$(echo "$acts" | jq 'length')" = "0" ]; then
                echo "_No Actions minute usage reported this month._" >> "$GITHUB_STEP_SUMMARY"
              else
                {
                  echo "| SKU | Minutes | Net cost |"
                  echo "|-----|--------:|---------:|"
                  echo "$acts" | jq -r '
                    group_by(.sku)[]
                    | "| \(.[0].sku) | \([.[].quantity] | add) min | $\((((([.[].netAmount] | add) * 100) | round) / 100)) |"'
                  echo ""
                  # used = minutes counted against the allowance (× OS multiplier).
                  echo "$acts" | jq -r --argjson inc "${INCLUDED:-0}" '
                    def m($s): ($s | ascii_downcase) as $x
                      | if ($x | test("windows")) then 2 elif ($x | test("mac")) then 10 else 1 end;
                    ([.[] | .quantity * m(.sku)] | add // 0) as $used
                    | ([.[].netAmount] | add // 0) as $net
                    | "**Used: \($used) min** (allowance-equivalent) · net cost $\((($net * 100) | round) / 100)"
                      + (if $inc > 0
                         then " · **Remaining: \(([$inc - $used, 0] | max)) / \($inc) min**"
                              + (if ($used > $inc) then " ⚠️ over by \($used - $inc) min" else "" end)
                         else "" end)'
                } >> "$GITHUB_STEP_SUMMARY"
              fi
            else
              echo "_Account usage unavailable — needs a classic PAT with \`Plan\` read access on an account with the enhanced billing platform._" >> "$GITHUB_STEP_SUMMARY"
            fi
          fi
