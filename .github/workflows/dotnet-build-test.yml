name: .NET Build & Test (reusable)

# Reusable .NET pipeline with a single, uniform shape for every caller:
#
#   build ──▶ test            (unsharded: one test job)
#   build ──▶ test (unit)     (sharded: parallel test jobs)
#           └▶ test (integration)
#
# The build job compiles ONCE and publishes its output as an artifact; the
# test job(s) run `dotnet test --no-build`, so the compile is never repeated
# per shard. Build-only repos (run-tests: false) just skip the test job.
#
# Call it from a consumer repo with:
#   jobs:
#     ci:
#       uses: tibor-horvath/ci-toolkit/.github/workflows/dotnet-build-test.yml@v1
#       with: { dotnet-version: '10.0.x', test-matrix: '["unit","integration"]' }
#       secrets: inherit
#       permissions: { checks: write, contents: read }

on:
  workflow_call:
    inputs:
      dotnet-version:
        description: ".NET SDK version to install."
        type: string
        default: "10.0.x"
      build-project:
        description: >-
          Solution or project to restore/build/test. Leave empty to let the
          SDK auto-discover the single .sln/.slnx in the repo root.
        type: string
        default: ""
      configuration:
        description: "Build configuration."
        type: string
        default: "Release"
      run-tests:
        description: "Run the test job. Set false for build-only repos."
        type: boolean
        default: true
      test-matrix:
        description: >-
          JSON array of shard tokens. When set, runs one test job per shard,
          filtering each by `FullyQualifiedName~.<shard>.`
          (e.g. '["unit","integration"]'). Empty -> a single test job.
        type: string
        default: ""
      test-filter:
        description: "Single --filter expression (ignored when test-matrix is set)."
        type: string
        default: ""
      runsettings:
        description: "Path to a .runsettings file passed via `dotnet test --settings`."
        type: string
        default: ""
      collect-coverage:
        description: 'Add `--collect:"XPlat Code Coverage"` and upload the report.'
        type: boolean
        default: true
      runs-on:
        description: "Runner label."
        type: string
        default: "ubuntu-latest"

permissions:
  checks: write
  contents: read

jobs:
  build:
    name: Build
    runs-on: ${{ inputs.runs-on }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Cache NuGet packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore ${{ inputs.build-project }}

      - name: Build
        run: dotnet build ${{ inputs.build-project }} --no-restore -c ${{ inputs.configuration }}

      - name: Package build output
        if: ${{ inputs.run-tests }}
        shell: bash
        # Tar the bin/obj trees into one file so artifact transfer is fast and
        # paths restore exactly (avoids upload-artifact's common-ancestor path
        # rewriting). -prune stops descent into matched dirs.
        run: |
          find . -type d \( -name bin -o -name obj \) -prune -print > build-dirs.txt
          tar -czf build-output.tar.gz -T build-dirs.txt
          echo "Packaged $(wc -l < build-dirs.txt) bin/obj dirs ($(du -h build-output.tar.gz | cut -f1))."

      - name: Upload build output
        if: ${{ inputs.run-tests }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: build-output
          path: build-output.tar.gz
          retention-days: 1
          if-no-files-found: error

  test:
    name: Test${{ matrix.shard != '' && format(' ({0})', matrix.shard) || '' }}
    if: ${{ inputs.run-tests }}
    needs: build
    runs-on: ${{ inputs.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        # Empty test-matrix collapses to a single (unsharded) test job.
        shard: ${{ fromJSON(inputs.test-matrix != '' && inputs.test-matrix || '[""]') }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      # Same key as the build job → warm hit, so `--no-build` can resolve the
      # MSBuild targets/props that packages contribute, without a download.
      - name: Cache NuGet packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Download build output
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: build-output

      - name: Unpack build output
        shell: bash
        run: tar -xzf build-output.tar.gz

      - name: Test
        shell: bash
        env:
          BUILD_PROJECT: ${{ inputs.build-project }}
          CONFIG: ${{ inputs.configuration }}
          SHARD: ${{ matrix.shard }}
          TEST_FILTER: ${{ inputs.test-filter }}
          RUNSETTINGS: ${{ inputs.runsettings }}
          COLLECT: ${{ inputs.collect-coverage }}
        run: |
          args=(test)
          if [ -n "$BUILD_PROJECT" ]; then args+=("$BUILD_PROJECT"); fi
          args+=(--no-build -c "$CONFIG" --logger "trx;LogFileName=results.trx")
          if [ -n "$SHARD" ]; then
            args+=(--filter "FullyQualifiedName~.$SHARD.")
          elif [ -n "$TEST_FILTER" ]; then
            args+=(--filter "$TEST_FILTER")
          fi
          if [ -n "$RUNSETTINGS" ]; then args+=(--settings "$RUNSETTINGS"); fi
          if [ "$COLLECT" = "true" ]; then args+=(--collect:"XPlat Code Coverage"); fi
          echo "dotnet ${args[*]}"
          dotnet "${args[@]}"

      - name: Test summary
        if: ${{ always() }}
        uses: dorny/test-reporter@3eeb9fc888e82e8be2fb356bbeec2750231672bc # v1
        with:
          name: Test Results${{ matrix.shard != '' && format(' ({0})', matrix.shard) || '' }}
          path: "**/TestResults/*.trx"
          reporter: dotnet-trx
          fail-on-error: true

      - name: Upload coverage
        if: ${{ inputs.collect-coverage }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage${{ matrix.shard != '' && format('-{0}', matrix.shard) || '' }}
          path: "**/TestResults/**/coverage.cobertura.xml"
          if-no-files-found: ignore
